<!DOCTYPE html>
<html>
<head>
  <title>Alarma GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 400px; }
  </style>
</head>
<body>

<h2>Destino</h2>

<input id="direccion" placeholder="Escribí una dirección">
<button onclick="buscarDireccion()">Buscar</button>

<p id="estado">Esperando...</p>

<div id="map"></div>

<script>
let map = L.map('map').setView([-34.6, -58.38], 13);
let marcadorDestino = null;
let destino = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Seleccionar manualmente
map.on('click', function(e) {
  let lat = e.latlng.lat;
  let lon = e.latlng.lng;

  ponerDestino(lat, lon);
});

// Buscar dirección
function buscarDireccion() {
  let dir = document.getElementById("direccion").value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dir}`)
    .then(res => res.json())
    .then(data => {
      if (data.length === 0) {
        alert("Dirección no encontrada");
        return;
      }

      let lat = data[0].lat;
      let lon = data[0].lon;

      ponerDestino(lat, lon);
      map.setView([lat, lon], 15);
    });
}

// Colocar destino
function ponerDestino(lat, lon) {
  destino = { lat, lon };

  if (marcadorDestino) {
    map.removeLayer(marcadorDestino);
  }

  marcadorDestino = L.marker([lat, lon]).addTo(map);

  document.getElementById("estado").innerText =
    "Destino: " + lat + ", " + lon;

  iniciarGPS();
}

// GPS + distancia
function iniciarGPS() {
  navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    let distancia = calcularDistancia(lat, lon, destino.lat, destino.lon);

    document.getElementById("estado").innerText =
      "Distancia: " + distancia.toFixed(2) + " km";

    if (distancia < 0.1) {
      alert("¡Llegaste al destino!");
    }
  });
}

// fórmula distancia
function calcularDistancia(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLon = (lon2 - lon1) * Math.PI / 180;

  let a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}
</script>

</body>
</html>
