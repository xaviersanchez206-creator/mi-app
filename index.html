
<!DOCTYPE html>
<html>
<head>
  <title>Alarma GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #map { height: 400px; margin-top: 10px; }
    input, button { padding: 10px; margin: 5px; }
  </style>
</head>
<body>

<h2>Alarma por ubicación</h2>

<input id="direccion" placeholder="Escribí dirección (opcional)">
<button onclick="buscarDireccion()">Buscar</button>

<br>

<label>Avisar cuando falten (km):</label>
<input id="radio" type="number" value="0.3" step="0.1">

<br>

<button onclick="centrarUsuario()">📍 Mi ubicación</button>

<p id="estado">Elegí un destino tocando el mapa o buscando una dirección</p>

<div id="map"></div>

<audio id="alarma" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let map = L.map('map').setView([-34.6, -58.38], 13);
let marcadorDestino = null;
let marcadorUsuario = null;
let destino = null;
let alarmaActiva = false;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📍 Selección manual MEJORADA
map.on('click', function(e) {
  let lat = e.latlng.lat;
  let lon = e.latlng.lng;

  if (confirm("¿Querés usar este punto como destino?")) {
    ponerDestino(lat, lon);
    map.setView([lat, lon], 16);
  }
});

// 🔎 Buscar dirección
function buscarDireccion() {
  let dir = document.getElementById("direccion").value;

  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${dir}`)
    .then(res => res.json())
    .then(data => {
      if (data.length === 0) {
        alert("Dirección no encontrada");
        return;
      }

      let lat = parseFloat(data[0].lat);
      let lon = parseFloat(data[0].lon);

      ponerDestino(lat, lon);
      map.setView([lat, lon], 16);
    });
}

// 🎯 Poner destino
function ponerDestino(lat, lon) {
  destino = { lat, lon };
  alarmaActiva = false;

  if (marcadorDestino) {
    map.removeLayer(marcadorDestino);
  }

  marcadorDestino = L.marker([lat, lon]).addTo(map);

  document.getElementById("estado").innerText =
    "Destino seleccionado ✔";
}

// 📍 Centrar usuario
function centrarUsuario() {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
  });
}

// 🚗 GPS en tiempo real
navigator.geolocation.watchPosition(pos => {
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  // marcador usuario
  if (marcadorUsuario) {
    marcadorUsuario.setLatLng([lat, lon]);
  } else {
    marcadorUsuario = L.marker([lat, lon]).addTo(map);
  }

  if (!destino) return;

  let distancia = calcularDistancia(lat, lon, destino.lat, destino.lon);
  let radio = parseFloat(document.getElementById("radio").value);

  document.getElementById("estado").innerText =
    "Distancia: " + distancia.toFixed(2) + " km";

  if (distancia < radio && !alarmaActiva) {
    alarmaActiva = true;
    document.getElementById("estado").innerText = "¡Estás llegando!";
    document.getElementById("alarma").play();
  }

}, error => {
  document.getElementById("estado").innerText =
    "Error GPS: activá la ubicación";
});

// 📏 Cálculo distancia
function calcularDistancia(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLon = (lon2 - lon1) * Math.PI / 180;

  let a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}
</script>

</body>
</html>
