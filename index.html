<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarma GPS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

.barra {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  z-index:1000;
  display:flex;
}

input { flex:1; padding:10px; }
button { padding:10px; }

#panelDistancia {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:15px;
  display:none;
  z-index:2000;
}

.grid {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:5px;
}

#panelAlarma {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:red;
  color:white;
  text-align:center;
  padding:20px;
  display:none;
  z-index:3000;
}
</style>
</head>

<body>

<div class="barra">
  <input id="direccion" placeholder="Escribí dirección">
  <button onclick="buscarDireccion()">Buscar</button>
  <button onclick="guardarLugar()">💾</button>
</div>

<div id="map"></div>

<div id="panelDistancia">
  <h3>Elegí distancia (metros)</h3>
  <div class="grid" id="opciones"></div>
  <button onclick="confirmarDistancia()">ACEPTAR</button>
</div>

<div id="panelAlarma">
  <h2>¡LLEGANDO!</h2>
  <button onclick="detenerAlarma()">DETENER</button>
</div>

<audio id="alarma" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let map = L.map('map').setView([-34.6,-58.38],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marcadorUsuario=null;
let marcadorDestino=null;
let circulo=null;
let destino=null;
let radio=0.3;
let alarmaActiva=false;
let seleccion=300;

// GPS
navigator.geolocation.watchPosition(pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;

  if(marcadorUsuario){
    marcadorUsuario.setLatLng([lat,lon]);
  }else{
    marcadorUsuario=L.circleMarker([lat,lon],{radius:8,color:"blue"}).addTo(map);
    map.setView([lat,lon],16);
  }

  if(!destino) return;

  let d=calcularDistancia(lat,lon,destino.lat,destino.lon);

  if(d<radio && !alarmaActiva){
    activarAlarma();
  }

});

// 🔎 BUSCADOR MEJORADO
function buscarDireccion(){
  let dir=document.getElementById("direccion").value;

  if(!dir){
    alert("Escribí una dirección");
    return;
  }

  dir = dir + ", Argentina";

  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(dir)}`)
  .then(r=>r.json())
  .then(data=>{
    if(data.length===0){
      alert("No encontrada. Probá marcar en el mapa.");
      return;
    }

    let lat=parseFloat(data[0].lat);
    let lon=parseFloat(data[0].lon);

    document.getElementById("direccion").value=data[0].display_name;

    ponerDestino(lat,lon);

    map.setView([lat,lon],17);

    mostrarOpciones();
  })
  .catch(()=>{
    alert("Error de conexión");
  });
}

// 📍 SELECCIÓN MANUAL (ARREGLADA DEFINITIVA)
map.on("contextmenu", function(e){
  let lat = e.latlng.lat;
  let lon = e.latlng.lng;

  ponerDestino(lat, lon);

  document.getElementById("direccion").value =
    lat.toFixed(5) + "," + lon.toFixed(5);

  mostrarOpciones();
});

// DESTINO
function ponerDestino(lat,lon){
  destino={lat,lon};
  alarmaActiva=false;

  if(marcadorDestino) map.removeLayer(marcadorDestino);
  if(circulo) map.removeLayer(circulo);

  marcadorDestino=L.marker([lat,lon]).addTo(map);
}

// DISTANCIAS
function mostrarOpciones(){
  let panel=document.getElementById("panelDistancia");
  let cont=document.getElementById("opciones");

  cont.innerHTML="";

  for(let i=100;i<=2000;i+=100){
    let btn=document.createElement("button");
    btn.innerText=i+"m";

    btn.onclick=()=>{
      seleccion=i;
      document.querySelectorAll(".grid button").forEach(b=>b.style.background="");
      btn.style.background="lightgreen";
    };

    cont.appendChild(btn);
  }

  panel.style.display="block";
}

// CONFIRMAR
function confirmarDistancia(){
  radio=seleccion/1000;

  if(destino){
    circulo=L.circle([destino.lat,destino.lon],{
      radius: radio*1000,
      color:"red",
      fill:false
    }).addTo(map);
  }

  document.getElementById("panelDistancia").style.display="none";

  alert("Despertador activado ✔");
}

// 🔔 ALARMA
function activarAlarma(){
  alarmaActiva=true;

  document.getElementById("panelAlarma").style.display="block";

  let audio=document.getElementById("alarma");
  audio.play();

  if(navigator.vibrate){
    navigator.vibrate([500,500,500]);
  }
}

// 🛑 DETENER Y REINICIAR
function detenerAlarma(){
  let audio=document.getElementById("alarma");
  audio.pause();
  audio.currentTime=0;

  document.getElementById("panelAlarma").style.display="none";

  destino=null;
  alarmaActiva=false;

  if(marcadorDestino) map.removeLayer(marcadorDestino);
  if(circulo) map.removeLayer(circulo);

  document.getElementById("direccion").value="";

  alert("Sistema reiniciado ✔");
}

// GUARDAR
function guardarLugar(){
  if(!destino){
    alert("No hay destino");
    return;
  }

  let nombre=prompt("Nombre del lugar:");
  if(!nombre) return;

  let lugares=JSON.parse(localStorage.getItem("lugares")||"[]");

  lugares.push({nombre,lat:destino.lat,lon:destino.lon});

  localStorage.setItem("lugares",JSON.stringify(lugares));

  alert("Guardado ✔");
}

// DISTANCIA
function calcularDistancia(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;

  let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

  let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

  return R*c;
}
</script>

</body>
</html>
