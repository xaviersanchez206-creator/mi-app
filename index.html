<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarma GPS PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

.barra {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  z-index:1000;
  display:flex;
  gap:5px;
}

input { flex:1; padding:10px; }
button { padding:10px; }

/* HUD */
#distanciaHUD {
  position:absolute;
  bottom:20px;
  right:10px;
  background:black;
  color:white;
  padding:12px;
  z-index:1500;
  border-radius:8px;
  display:none;
  line-height:1.4;
}

/* BOTON DETENER */
#btnDetener {
  position:absolute;
  bottom:20px;
  left:20px;
  z-index:2000;
  padding:12px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
  display:none;
}

/* GUARDADOS */
#panelGuardados {
  position:absolute;
  top:60px;
  right:10px;
  background:white;
  z-index:1500;
  padding:10px;
  max-height:200px;
  overflow:auto;
  border-radius:5px;
  display:none;
}

#panelDistancia {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:15px;
  display:none;
  z-index:2000;
}

.grid {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:5px;
}

#panelAlarma {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:red;
  color:white;
  text-align:center;
  padding:20px;
  display:none;
  z-index:3000;
}

/* UBICACION (corregido) */
#btnUbicacion {
  position:absolute;
  bottom:80px;
  left:20px;
  z-index:1500;
  padding:10px;
}
</style>
</head>

<body>

<div class="barra" id="barra">
  <input id="direccion" placeholder="Escribí dirección">
  <button onclick="buscarDireccion()">Buscar</button>
  <button onclick="guardarLugar()">💾</button>
  <button onclick="toggleGuardados()">⋮</button>
</div>

<div id="map"></div>

<div id="distanciaHUD"></div>

<button id="btnDetener" onclick="detenerAlarma()">DETENER</button>

<div id="panelGuardados"></div>

<button id="btnUbicacion" onclick="irMiUbicacion()">Mi ubicación</button>

<div id="panelDistancia">
  <h3>Elegí distancia (metros)</h3>
  <div class="grid" id="opciones"></div>
  <button onclick="confirmarDistancia()">ACEPTAR</button>
</div>

<div id="panelAlarma">
  <h2>¡LLEGANDO!</h2>
  <button onclick="detenerAlarma()">DETENER</button>
</div>

<audio id="alarma" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let map = L.map('map',{zoomControl:false}).setView([-34.6,-58.38],15);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marcadorUsuario=null;
let marcadorDestino=null;
let circulo=null;
let destino=null;
let radio=0.3;
let alarmaActiva=false;
let seleccion=300;
let ubicacionActual=null;
let distanciaActual=0;
let intervaloAlarma=null;

// GPS
navigator.geolocation.watchPosition(pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;

  ubicacionActual=[lat,lon];

  if(marcadorUsuario){
    marcadorUsuario.setLatLng([lat,lon]);
  }else{
    marcadorUsuario=L.circleMarker([lat,lon],{radius:8,color:"blue"}).addTo(map);
    map.setView([lat,lon],16);
  }

  if(!destino) return;

  let d=calcularDistancia(lat,lon,destino.lat,destino.lon);
  let nuevaDist = d * 1000;

  if(Math.abs(distanciaActual - nuevaDist) > 5){
    distanciaActual = nuevaDist;
    actualizarHUD();
  }

  if(d < radio && !alarmaActiva && destino){
    activarAlarma();
  }
});

// UBICACION
function irMiUbicacion(){
  if(ubicacionActual){
    map.setView(ubicacionActual,16);
  }
}

// BUSCAR
function buscarDireccion(){
  let dir=document.getElementById("direccion").value;

  if(!dir){
    alert("Escribí una dirección");
    return;
  }

  dir += ", Argentina";

  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(dir)}`)
  .then(r=>r.json())
  .then(data=>{
    if(data.length===0){
      alert("No encontrada");
      return;
    }

    let lat=parseFloat(data[0].lat);
    let lon=parseFloat(data[0].lon);

    document.getElementById("direccion").value=data[0].display_name;

    ponerDestino(lat,lon);
    map.setView([lat,lon],17);
    mostrarOpciones();
  });
}

// CLICK
map.on("contextmenu", function(e){
  let lat=e.latlng.lat;
  let lon=e.latlng.lng;

  ponerDestino(lat,lon);

  document.getElementById("direccion").value =
    lat.toFixed(5)+","+lon.toFixed(5);

  mostrarOpciones();
});

// DESTINO
function ponerDestino(lat,lon){
  destino={lat,lon};
  alarmaActiva=false;

  if(marcadorDestino) map.removeLayer(marcadorDestino);
  if(circulo) map.removeLayer(circulo);

  marcadorDestino=L.marker([lat,lon]).addTo(map);

  document.getElementById("distanciaHUD").style.display = "block";

  if(ubicacionActual){
    let d = calcularDistancia(
      ubicacionActual[0],
      ubicacionActual[1],
      lat,
      lon
    );

    distanciaActual = d * 1000;
    actualizarHUD();
  }
}

// ACTUALIZA HUD
function actualizarHUD(){
  let texto = "Distancia: " + Math.round(distanciaActual) + " m";

  if(radio){
    texto += "<br>Alarma: " + seleccion + " m";
  }

  document.getElementById("distanciaHUD").innerHTML = texto;
}

// OPCIONES
function mostrarOpciones(){
  if(!ubicacionActual){
    alert("Esperando GPS...");
    return;
  }

  let cont=document.getElementById("opciones");
  cont.innerHTML="";

  let maxReal = Math.floor((distanciaActual - 100)/100)*100;

  if(maxReal < 100){
    alert("Estás demasiado cerca");
    return;
  }

  let maxFinal = Math.min(maxReal, 3000);

  for(let i=100;i<=3000;i+=100){
    let btn=document.createElement("button");
    btn.innerText=i+"m";

    if(i > maxFinal){
      btn.disabled = true;
      btn.style.opacity = "0.3";
    }

    btn.onclick=()=>{
      if(i > maxFinal) return;

      seleccion=i;
      document.querySelectorAll(".grid button").forEach(b=>b.style.background="");
      btn.style.background="lightgreen";
    };

    cont.appendChild(btn);
  }

  document.getElementById("panelDistancia").style.display="block";
}

// CONFIRMAR
function confirmarDistancia(){
  radio=seleccion/1000;

  if(circulo) map.removeLayer(circulo);

  circulo=L.circle([destino.lat,destino.lon],{
    radius: radio*1000,
    color:"red",
    fill:false
  }).addTo(map);

  document.getElementById("panelDistancia").style.display="none";
  document.getElementById("barra").style.display="none";

  document.getElementById("btnDetener").style.display="block";

  actualizarHUD();
}

// ALARMA
function activarAlarma(){
  if(alarmaActiva) return;

  alarmaActiva=true;

  document.getElementById("panelAlarma").style.display="block";

  let audio=document.getElementById("alarma");
  audio.play();

  intervaloAlarma=setInterval(()=>{
    audio.play();
  },5000);
}

// DETENER
function detenerAlarma(){
  resetearApp();
}

// RESET
function resetearApp(){
  let audio=document.getElementById("alarma");
  audio.pause();
  audio.currentTime=0;

  clearInterval(intervaloAlarma);

  document.getElementById("panelAlarma").style.display="none";
  document.getElementById("btnDetener").style.display="none";

  destino=null;
  alarmaActiva=false;

  if(marcadorDestino) map.removeLayer(marcadorDestino);
  if(circulo) map.removeLayer(circulo);

  document.getElementById("direccion").value="";
  document.getElementById("barra").style.display="flex";

  document.getElementById("distanciaHUD").style.display="none";
}

// GUARDADOS
function cargarGuardados(){
  let cont=document.getElementById("panelGuardados");
  cont.innerHTML="<b>Guardados</b><br>";

  let lugares=JSON.parse(localStorage.getItem("lugares")||"[]");

  lugares.forEach(l=>{
    let btn=document.createElement("button");
    btn.innerText=l.nombre;

    btn.onclick=()=>{
      ponerDestino(l.lat,l.lon);
      map.setView([l.lat,l.lon],17);
      mostrarOpciones();
    };

    cont.appendChild(btn);
  });
}

function toggleGuardados(){
  let panel=document.getElementById("panelGuardados");
  panel.style.display = (panel.style.display === "none") ? "block" : "none";
}

function guardarLugar(){
  if(!destino){
    alert("No hay destino");
    return;
  }

  let nombre=prompt("Nombre:");
  if(!nombre) return;

  let lugares=JSON.parse(localStorage.getItem("lugares")||"[]");
  lugares.push({nombre,lat:destino.lat,lon:destino.lon});

  localStorage.setItem("lugares",JSON.stringify(lugares));

  cargarGuardados();
}

cargarGuardados();

// DISTANCIA
function calcularDistancia(lat1,lon1,lat2,lon2){
  let R=6371;
  let dLat=(lat2-lat1)*Math.PI/180;
  let dLon=(lon2-lon1)*Math.PI/180;

  let a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

  let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

  return R*c;
}
</script>

</body>
</html>
