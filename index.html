<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Alarma REPARADO</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { --primary: #2563eb; --danger: #ef4444; }
        body { margin:0; font-family: sans-serif; overflow: hidden; background: #0f172a; }
        #map { height:100vh; width: 100vw; }
        .leaflet-routing-container { display: none !important; }

        .barra {
            position:absolute; top:10px; left:10px; right:10px; z-index:1000;
            display:flex; gap:5px; background: white; padding: 8px; border-radius: 12px;
        }
        input { flex:1; padding:10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        
        #distanciaHUD {
            position:absolute; bottom:130px; right:10px; background: rgba(0,0,0,0.8);
            color:white; padding:15px; z-index:1500; border-radius:12px; display:none;
        }

        .panel {
            position:absolute; bottom:0; left:0; right:0; background: white;
            padding:20px; z-index:2000; border-radius: 20px 20px 0 0; display:none; text-align: center;
        }

        #btnCentrar {
            position:absolute; bottom:130px; left:10px; z-index:1500;
            background: white; border-radius: 50%; width: 50px; height: 50px; border: none; font-size: 20px;
        }

        .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin: 15px 0; }
        .grid button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; }
    </style>
</head>
<body>

<div class="barra">
    <input id="direccion" placeholder="Buscar destino...">
    <button style="padding:10px" onclick="buscarDireccion()">🔍</button>
</div>

<div id="map"></div>
<button id="btnCentrar" onclick="centrarMapa()">🎯</button>
<div id="distanciaHUD"></div>

<div id="panelDistancia" class="panel">
    <h3>¿A qué distancia avisar?</h3>
    <div class="grid" id="opciones"></div>
    <button id="confirmarBtn" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">
        ACTIVAR ALARMA
    </button>
</div>

<div id="panelAlarma" class="panel" style="background: var(--danger); color: white;">
    <h1>🚨 ¡LLEGASTE!</h1>
    <button onclick="location.reload()" style="padding:15px 30px; border-radius:10px; border:none; font-weight:bold;">DETENER</button>
</div>

<audio id="sonido" loop preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3" type="audio/mpeg">
</audio>

<script>
let map = L.map('map', {zoomControl: false}).setView([-34.6, -58.4], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marcadorUsuario, marcadorDestino, circuloAlarma, controlRuteo;
let destino, radioMetros = 0, ubicacionActual;

// ACTIVACIÓN DE AUDIO Y GPS (MUY IMPORTANTE)
document.getElementById('confirmarBtn').addEventListener('click', function() {
    const audio = document.getElementById('sonido');
    audio.play().then(() => {
        audio.pause(); // "Despertamos" el audio para que pueda sonar después
        audio.currentTime = 0;
        confirmarDistancia();
    }).catch(e => {
        console.log("Error de audio:", e);
        confirmarDistancia(); // Intentar igual
    });
});

// WATCH POSITION - ACTUALIZACIÓN CONSTANTE
navigator.geolocation.watchPosition(pos => {
    ubicacionActual = L.latLng(pos.coords.latitude, pos.coords.longitude);
    
    if (!marcadorUsuario) {
        marcadorUsuario = L.circleMarker(ubicacionActual, {radius: 8, color: 'blue', fillColor: 'white', fillOpacity: 1}).addTo(map);
        map.setView(ubicacionActual, 16);
    } else {
        marcadorUsuario.setLatLng(ubicacionActual);
    }

    if (controlRuteo && destino) {
        controlRuteo.setWaypoints([ubicacionActual, L.latLng(destino.lat, destino.lon)]);
    }
}, err => alert("Error GPS: " + err.message), { 
    enableHighAccuracy: true, 
    maximumAge: 0, 
    timeout: 5000 
});

async function buscarDireccion() {
    let q = document.getElementById("direccion").value;
    const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=ar`);
    const data = await resp.json();
    if (data.length > 0) fijarDestino(parseFloat(data[0].lat), parseFloat(data[0].lon));
}

map.on('contextmenu', e => fijarDestino(e.latlng.lat, e.latlng.lng));

function fijarDestino(lat, lon) {
    destino = { lat, lon };
    if (marcadorDestino) map.removeLayer(marcadorDestino);
    marcadorDestino = L.marker([lat, lon]).addTo(map);
    
    const cont = document.getElementById("opciones");
    cont.innerHTML = "";
    [100, 300, 500, 1000].forEach(m => {
        let btn = document.createElement("button");
        btn.innerText = m + "m";
        btn.onclick = () => {
            radioMetros = m;
            document.querySelectorAll(".grid button").forEach(b => b.style.background = "#f8f9fa");
            btn.style.background = "blue"; btn.style.color = "white";
        };
        cont.appendChild(btn);
    });
    document.getElementById("panelDistancia").style.display = "block";
}

function confirmarDistancia() {
    if (radioMetros === 0) return alert("Elegí la distancia");

    if (circuloAlarma) map.removeLayer(circuloAlarma);
    circuloAlarma = L.circle([destino.lat, destino.lon], {
        radius: radioMetros, color: 'cyan', weight: 2, fillOpacity: 0.2
    }).addTo(map);

    controlRuteo = L.Routing.control({
        waypoints: [ubicacionActual, L.latLng(destino.lat, destino.lon)],
        addWaypoints: false,
        lineOptions: { styles: [{ color: 'blue', weight: 5 }] }
    }).addTo(map);

    controlRuteo.on('routesfound', e => {
        const distRuta = e.routes[0].summary.totalDistance;
        const hud = document.getElementById("distanciaHUD");
        hud.style.display = "block";
        hud.innerHTML = `Faltan: ${Math.round(distRuta)}m<br>Alarma en: ${radioMetros}m`;
        
        // LOGICA DE DISPARO
        if (distRuta <= radioMetros) {
            document.getElementById("panelAlarma").style.display = "block";
            document.getElementById("sonido").play();
            if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
        }
    });

    document.getElementById("panelDistancia").style.display = "none";
    document.querySelector(".barra").style.display = "none";
}

function centrarMapa() { if (ubicacionActual) map.flyTo(ubicacionActual, 16); }
</script>
</body>
</html>
