<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GPS ALARMA PRO - Optimizado</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
    --bg-dark: #0f172a;
    --card-dark: #1e293b;
    --accent: #38bdf8;
    --danger: #ef4444;
    --text: #f8fafc;
}

body { margin:0; font-family:system-ui; background:var(--bg-dark); color:var(--text); overflow:hidden; }
#map { height:100vh; width:100vw; }

.search-container {
    position:absolute; top:15px; left:10px; right:10px; z-index:1000;
    display:flex; gap:8px; background:var(--card-dark);
    padding:10px; border-radius:16px;
}

input { flex:1; background:#0f172a; border:1px solid #334155; color:white; padding:12px; border-radius:10px; }
button { padding:12px; border-radius:10px; border:none; font-weight:bold; }
.btn-primary { background:var(--accent); }

#hud {
    position:absolute; bottom:120px; right:10px;
    background:#000c; padding:15px; border-radius:15px;
    display:none;
}

#alarm-overlay {
    position:absolute; inset:0; background:var(--danger);
    display:none; align-items:center; justify-content:center;
    flex-direction:column;
}
</style>
</head>
<body>

<div class="search-container">
    <input id="target-input" placeholder="Destino...">
    <button class="btn-primary" onclick="searchLoc()">🔍</button>
</div>

<div id="map"></div>

<div id="hud">
    <div id="distance">---</div>
</div>

<div id="alarm-overlay">
    <h1>🚨 LLEGANDO 🚨</h1>
    <button onclick="stopAlarm()">OK</button>
</div>

<audio id="audio" loop>
<source src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3">
</audio>

<script>
let map = L.map('map').setView([-34.61, -58.41], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker, targetMarker;
let userPos, targetCoords;
let alertDistance = 300;
let alarmTriggered = false;
let lastPositions = [];
let lastDistance = null;

// suavizado GPS
function smooth(pos){
    lastPositions.push(pos);
    if(lastPositions.length > 5) lastPositions.shift();

    let lat = lastPositions.reduce((a,p)=>a+p.lat,0)/lastPositions.length;
    let lng = lastPositions.reduce((a,p)=>a+p.lng,0)/lastPositions.length;
    return L.latLng(lat,lng);
}

navigator.geolocation.watchPosition(p=>{
    let raw = L.latLng(p.coords.latitude,p.coords.longitude);
    userPos = smooth(raw);

    if(!userMarker){
        userMarker = L.circleMarker(userPos).addTo(map);
        map.setView(userPos,16);
    } else userMarker.setLatLng(userPos);

    if(targetCoords) checkDistance();

},null,{maximumAge:5000,timeout:10000});

async function searchLoc(){
    let q = document.getElementById('target-input').value;
    let r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    let d = await r.json();
    if(d[0]) setTarget(d[0].lat,d[0].lon);
}

function setTarget(lat,lon){
    targetCoords = L.latLng(lat,lon);
    if(targetMarker) map.removeLayer(targetMarker);
    targetMarker = L.marker(targetCoords).addTo(map);
    alarmTriggered = false;
    lastDistance = null;
}

function checkDistance(){
    let d = Math.round(userPos.distanceTo(targetCoords));
    document.getElementById('distance').innerText = d+" m";

    if(lastDistance !== null){
        let approaching = d < lastDistance;

        if(!alarmTriggered && approaching && d <= alertDistance){
            triggerAlarm();
            alarmTriggered = true;
        }
    }

    lastDistance = d;
}

function triggerAlarm(){
    document.getElementById('alarm-overlay').style.display='flex';
    document.getElementById('audio').play();
    navigator.vibrate?.([500,300,500]);
}

function stopAlarm(){
    document.getElementById('alarm-overlay').style.display='none';
    let a = document.getElementById('audio');
    a.pause(); a.currentTime=0;
}

</script>

</body>
</html>
