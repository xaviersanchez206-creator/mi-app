<!DOCTYPE html>
<html>
<head>
  <title>Alarma GPS</title>
</head>
<body>

<h2>Alarma por ubicación</h2>

<input id="destino" placeholder="Pegá link de Google Maps">
<br><br>

<button onclick="iniciar()">IR</button>

<p id="estado">Esperando...</p>

<script>
let destinoLat = null;
let destinoLon = null;

function iniciar() {
  let link = document.getElementById("destino").value;

  let match = link.match(/q=(-?\d+.\d+),(-?\d+.\d+)/);

  if (!match) {
    document.getElementById("estado").innerText = "Link inválido";
    return;
  }

  destinoLat = parseFloat(match[1]);
  destinoLon = parseFloat(match[2]);

  navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    let distancia = calcularDistancia(lat, lon, destinoLat, destinoLon);

    document.getElementById("estado").innerText =
      "Distancia: " + distancia.toFixed(2) + " km";

    if (distancia < 0.1) {
      alert("¡Llegaste al destino!");
    }
  });
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2 - lat1) * Math.PI / 180;
  let dLon = (lon2 - lon1) * Math.PI / 180;

  let a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}
</script>

</body>
</html>
