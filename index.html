<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Alarma Pro - Despertador</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --glass: rgba(255, 255, 255, 0.95); }
        body { margin:0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; background: #0f172a; }
        #map { height:100vh; width: 100vw; }

        .leaflet-routing-container { display: none !important; }

        .barra {
            position:absolute; top:15px; left:10px; right:10px; z-index:1000;
            display:flex; gap:8px; background: var(--glass);
            padding: 10px; border-radius: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        input { flex:1; padding:12px; border: none; border-radius: 10px; font-size: 16px; outline: none; background: #f1f5f9; }
        
        .btn-icon { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 18px; cursor: pointer; }

        #distanciaHUD {
            position:absolute; bottom:110px; right:10px;
            background: rgba(15, 23, 42, 0.9); color:white;
            padding:15px; z-index:1500; border-radius:15px;
            display:none; font-family: monospace; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel {
            position:absolute; bottom:0; left:0; right:0;
            background: white; padding:25px; z-index:2000;
            border-radius: 25px 25px 0 0; display:none; text-align: center;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #btnDetener {
            position:absolute; bottom:30px; left:50%; transform: translateX(-50%);
            z-index:2500; padding:15px 40px; background: var(--danger);
            color:white; border-radius: 30px; display:none; border: 2px solid white; font-weight: bold;
        }

        .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin: 15px 0; }
        .grid button { padding: 12px 5px; border-radius: 10px; border: 1px solid #ddd; background: #f8f9fa; font-weight: bold; }
        .grid button:disabled { opacity: 0.2; }

        .selector-modo { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .modo-btn { padding: 10px 20px; border-radius: 10px; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 20px; }
        .modo-btn.active { border-color: var(--primary); background: #eff6ff; }
    </style>
</head>
<body>

<div class="barra">
    <input id="direccion" placeholder="¿A dónde vamos?">
    <button class="btn-icon" onclick="buscarDireccion()">🔍</button>
</div>

<div id="map"></div>

<button id="btnDetener" onclick="location.reload()">CANCELAR VIAJE</button>
<div id="distanciaHUD"></div>

<div id="panelDistancia" class="panel">
    <h3 style="margin-top:0">Configuración de Viaje</h3>
    <div class="selector-modo">
        <button id="btnCar" class="modo-btn active" onclick="setModo('car')">🚗</button>
        <button id="btnFoot" class="modo-btn" onclick="setModo('foot')">🚶</button>
    </div>
    <div class="grid" id="opciones"></div>
    <button class="btn-icon" style="width:100%; height: 55px;" onclick="confirmarDistancia()">INICIAR GPS</button>
</div>

<div id="panelAlarma" class="panel" style="background: var(--danger); color: white;">
    <h1 style="margin:0">🚨 ¡DESPERTATE! 🚨</h1>
    <p>Ya estás llegando a tu destino.</p>
    <button style="background:white; color:var(--danger); padding:15px 40px; border-radius:15px; border:none; font-weight:bold; margin-top:10px" onclick="location.reload()">DETENER ALARMA</button>
</div>

<audio id="sonido" loop src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3"></audio>

<script>
let map = L.map('map', {zoomControl: false}).setView([-34.6, -58.4], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let marcadorUsuario = null, destino = null, radioMetros = 0, ubicacionActual = null;
let controlRuteo = null, modoViaje = 'car', wakeLock = null;

navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude } = pos.coords;
    ubicacionActual = L.latLng(latitude, longitude);

    if (!marcadorUsuario) {
        marcadorUsuario = L.circleMarker(ubicacionActual, {radius: 8, color: '#2563eb', fillColor: 'white', fillOpacity: 1, weight: 3}).addTo(map);
        map.setView(ubicacionActual, 16);
    } else {
        marcadorUsuario.setLatLng(ubicacionActual);
    }

    if (controlRuteo && destino) {
        controlRuteo.setWaypoints([ubicacionActual, L.latLng(destino.lat, destino.lon)]);
    }
}, null, { enableHighAccuracy: true });

async function buscarDireccion() {
    let q = document.getElementById("direccion").value;
    const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=ar`);
    const data = await resp.json();
    if (data.length > 0) fijarDestino(parseFloat(data[0].lat), parseFloat(data[0].lon));
}

function fijarDestino(lat, lon) {
    if (!ubicacionActual) return alert("Esperando señal GPS...");
    destino = { lat, lon };
    const distVuelo = ubicacionActual.distanceTo(L.latLng(lat, lon));
    const cont = document.getElementById("opciones");
    cont.innerHTML = "";
    [100, 200, 300, 500, 800, 1000, 1500, 2000].forEach(m => {
        let btn = document.createElement("button");
        btn.innerText = m + "m";
        if (m >= distVuelo) btn.disabled = true;
        btn.onclick = () => {
            radioMetros = m;
            document.querySelectorAll(".grid button").forEach(b => {b.style.background = "#f8f9fa"; b.style.color="black"});
            btn.style.background = "#2563eb"; btn.style.color = "white";
        };
        cont.appendChild(btn);
    });
    document.getElementById("panelDistancia").style.display = "block";
}

function setModo(m) {
    modoViaje = m;
    document.getElementById("btnCar").classList.toggle("active", m === 'car');
    document.getElementById("btnFoot").classList.toggle("active", m === 'foot');
}

async function confirmarDistancia() {
    if (radioMetros === 0) return alert("Elegí a cuántos metros avisar");
    const serviceUrl = modoViaje === 'car' ? 'https://router.project-osrm.org/route/v1/driving' : 'https://router.project-osrm.org/route/v1/foot';
    controlRuteo = L.Routing.control({
        waypoints: [ubicacionActual, L.latLng(destino.lat, destino.lon)],
        router: L.Routing.osrmv1({ serviceUrl: serviceUrl }),
        addWaypoints: false,
        lineOptions: { styles: [{ color: '#2563eb', weight: 6, opacity: 0.7 }] }
    }).addTo(map);

    controlRuteo.on('routesfound', function(e) {
        const distRuta = e.routes[0].summary.totalDistance;
        document.getElementById("distanciaHUD").style.display = "block";
        document.getElementById("distanciaHUD").innerHTML = `<b>GPS EN VIVO</b><br>Ruta: ${Math.round(distRuta)}m<br>Alarma: ${radioMetros}m`;
        if (distRuta <= radioMetros) activarAlarma();
    });

    document.getElementById("panelDistancia").style.display = "none";
    document.getElementById("btnDetener").style.display = "block";
    document.querySelector(".barra").style.display = "none";
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}

function activarAlarma() {
    if (document.getElementById("panelAlarma").style.display === "block") return;
    document.getElementById("panelAlarma").style.display = "block";
    const audio = document.getElementById("sonido");
    audio.volume = 1.0; // Forzamos volumen al máximo
    audio.play();
    if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000, 500, 1000]); // Vibración más larga
}
</script>
</body>
</html>
